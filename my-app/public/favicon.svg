<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a14"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>

  <!-- Border frame -->
  <rect x="2" y="2" width="60" height="60" rx="8" fill="none" stroke="url(#border)" stroke-width="1.5" opacity="0.8"/>

  <!-- Corner accents top-left -->
  <line x1="2" y1="14" x2="2" y2="2" stroke="#00f5ff" stroke-width="2"/>
  <line x1="2" y1="2" x2="14" y2="2" stroke="#00f5ff" stroke-width="2"/>
  <!-- Corner accents bottom-right -->
  <line x1="62" y1="50" x2="62" y2="62" stroke="#7c3aed" stroke-width="2"/>
  <line x1="62" y1="62" x2="50" y2="62" stroke="#7c3aed" stroke-width="2"/>

  <!-- IM text -->
  <text
    x="32" y="42"
    font-family="Arial Black, sans-serif"
    font-size="28"
    font-weight="900"
    fill="#00f5ff"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="-1"
  >IM</text>

  <!-- Underline accent -->
  <line x1="14" y1="48" x2="50" y2="48" stroke="url(#border)" stroke-width="1" opacity="0.6"/>
</svg>
